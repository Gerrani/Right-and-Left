<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Byte's Delivery — Left &amp; Right</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;
     font-family:"Poppins","Trebuchet MS",system-ui,sans-serif; }
  html,body{ height:100%; overflow:hidden; background:#7bc043; }
  :root{ --btn-h: clamp(64px, 9vh, 92px); }   /* shared height for all SVG buttons (native 92px) */

  #stage{ position:fixed; inset:0; overflow:hidden; }
  .screen{ position:absolute; inset:0; }
  .hide{ display:none !important; }
  .full{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; user-select:none; }

  /* GAME world mapped to a 1920x1080 frame, covering the viewport */
  #world{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:max(100vw, 177.78vh); height:max(100vh, 56.25vw);
  }
  #bg{ width:100%; height:100%; display:block; user-select:none; pointer-events:none; }
  .house{ position:absolute; width:13.33%; height:auto; z-index:2; pointer-events:none; transform-origin:bottom center; }
  .house.barking{ animation:dogBark .28s ease-in-out infinite; }
  #houseLeft{ left:5.06%; top:28.61%; filter:drop-shadow(-16px 7px 8px rgba(0,0,0,.34)); }
  #houseRight{ left:85.51%; top:28.61%; transform:scaleX(-1); filter:drop-shadow(16px 7px 8px rgba(0,0,0,.34)); } /* +x flips to the left */
  #houseRight.barking{ animation:dogBarkFlip .28s ease-in-out infinite; }
  @keyframes dogBarkFlip{ 0%,100%{ transform:scaleX(-1); } 45%{ transform:scaleX(-1) scale(1.08,.93); } }
  /* happy little squash-and-stretch hop when the house receives its parcel */
  .house.happy{ animation:houseHappy .95s cubic-bezier(.3,1.3,.5,1); }
  #houseRight.happy{ animation:houseHappyFlip .95s cubic-bezier(.3,1.3,.5,1); }
  @keyframes houseHappy{
    0%{ transform:scale(1,1); }
    16%{ transform:scale(1.07,.9); }
    38%{ transform:scale(.93,1.11) translateY(-4%); }
    58%{ transform:scale(1.05,.96) translateY(0); }
    78%{ transform:scale(.98,1.04) translateY(-1.6%); }
    100%{ transform:scale(1,1); }
  }
  @keyframes houseHappyFlip{
    0%{ transform:scaleX(-1) scale(1,1); }
    16%{ transform:scaleX(-1) scale(1.07,.9); }
    38%{ transform:scaleX(-1) scale(.93,1.11) translateY(-4%); }
    58%{ transform:scaleX(-1) scale(1.05,.96) translateY(0); }
    78%{ transform:scaleX(-1) scale(.98,1.04) translateY(-1.6%); }
    100%{ transform:scaleX(-1) scale(1,1); }
  }
  /* quick little settle-bounce as the door shuts */
  .house.bounce{ animation:houseBounce .45s ease-out; }
  #houseRight.bounce{ animation:houseBounceFlip .45s ease-out; }
  @keyframes houseBounce{
    0%{ transform:scale(1,1); }
    35%{ transform:scale(1.05,.93); }
    65%{ transform:scale(.98,1.03); }
    100%{ transform:scale(1,1); }
  }
  @keyframes houseBounceFlip{
    0%{ transform:scaleX(-1) scale(1,1); }
    35%{ transform:scaleX(-1) scale(1.05,.93); }
    65%{ transform:scaleX(-1) scale(.98,1.03); }
    100%{ transform:scaleX(-1) scale(1,1); }
  }

  /* moving walkway on the vertical path — glowing upward chevrons + centre light line */
  #travelator{
    position:absolute; left:calc(47% + 35px); top:55%; transform:translateX(-50%);
    width:5%; height:45%; z-index:3; pointer-events:none; opacity:.7;
    filter:drop-shadow(0 0 5px rgba(53,208,236,.85));
    background:
      url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='100'%20height='56'%20viewBox='0%200%20100%2056'%3E%3Cpath%20d='M50%206%20L86%2038%20L50%2024%20L14%2038%20Z'%20fill='%2335d0ec'/%3E%3C/svg%3E");
    background-repeat:repeat-y;
    background-size:100% 56px;
    -webkit-mask-image:linear-gradient(180deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
            mask-image:linear-gradient(180deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
    animation:travel 2.4s linear infinite;
  }
  @keyframes travel{ from{ background-position:0 0; } to{ background-position:0 -56px; } }

  /* horizontal escalators on the left / right roads */
  .travH{
    position:absolute; top:48%; height:9%; z-index:3; pointer-events:none; opacity:.7;
    filter:drop-shadow(0 0 5px rgba(53,208,236,.85));
    background-repeat:repeat-x;
    -webkit-mask-image:linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
            mask-image:linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%);
  }
  #travLeft{ left:16%; width:30%; }
  #travRight{ left:51%; width:30%; }
  .travH.point-left{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='56'%20height='100'%20viewBox='0%200%2056%20100'%3E%3Cpath%20d='M6%2050%20L38%2014%20L24%2050%20L38%2086%20Z'%20fill='%2335d0ec'/%3E%3C/svg%3E");
    background-size:56px 100%; animation:travL 2.4s linear infinite;
  }
  .travH.point-right{
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='56'%20height='100'%20viewBox='0%200%2056%20100'%3E%3Cpath%20d='M50%2050%20L18%2014%20L32%2050%20L18%2086%20Z'%20fill='%2335d0ec'/%3E%3C/svg%3E");
    background-size:56px 100%; animation:travR 2.4s linear infinite;
  }
  @keyframes travL{ from{ background-position:0 0; } to{ background-position:-56px 0; } }
  @keyframes travR{ from{ background-position:0 0; } to{ background-position:56px 0; } }

  /* Target glow + arrow */
  .glow{
    position:absolute; width:18%; aspect-ratio:1; transform:translate(-50%,-50%);
    border-radius:50%; pointer-events:none; opacity:0; transition:opacity .3s;
    background:radial-gradient(circle, rgba(255,238,120,.85) 0%, rgba(255,210,60,.35) 45%, rgba(255,210,60,0) 70%);
    animation:pulse 1.1s ease-in-out infinite;
  }
  .glow.on{ opacity:1; }
  #glowLeft{ left:14%; top:40%; }
  #glowRight{ left:85%; top:38%; }
  @keyframes pulse{ 0%,100%{ transform:translate(-50%,-50%) scale(.9);} 50%{ transform:translate(-50%,-50%) scale(1.12);} }
  .arrow{
    position:absolute; transform:translate(-50%,-50%); font-size:clamp(22px,4vw,52px);
    pointer-events:none; opacity:0; transition:opacity .3s; filter:drop-shadow(0 2px 2px rgba(0,0,0,.4));
    animation:bob 0.8s ease-in-out infinite;
  }
  .arrow.on{ opacity:1; }
  #arrowLeft{ left:14%; top:20%; }
  #arrowRight{ left:85%; top:18%; }
  @keyframes bob{ 0%,100%{ margin-top:0; } 50%{ margin-top:10px; } }

  /* Byte — positioned by foot point, native size */
  #byteWrap{ position:absolute; left:0; top:0; transition:left 2.6s linear, top 2.6s linear; z-index:5; }
  #byteAnim{ width:100%; transition:transform .2s; }
  /* detailed ground shadow under Byte — grounded oval that shrinks, fades & softens as he lifts off */
  #byteShadow{ position:absolute; left:50%; top:74%; transform:translate(-50%,-50%) scale(1); z-index:0; pointer-events:none;
    width:74%; height:17%; border-radius:50%; will-change:transform,opacity,filter; filter:blur(2.5px);
    background:radial-gradient(ellipse at 50% 50%, rgba(0,0,0,.5) 0%, rgba(0,0,0,.36) 38%, rgba(0,0,0,.14) 64%, rgba(0,0,0,0) 82%); }
  #byteShadow.sh-leap{ animation:shadowLeap 430ms linear; }
  /* tight & dark on the ground · expands & lightens at the apex */
  @keyframes shadowLeap{
    0%      { transform:translate(-50%,-50%) scale(.95); opacity:1;  filter:blur(2.5px); }
    42%     { transform:translate(-50%,-50%) scale(1.16); opacity:.55; filter:blur(4px); }
    80%,100%{ transform:translate(-50%,-50%) scale(.95); opacity:1;  filter:blur(2.5px); }
  }
  /* whole-screen ambient shade — heavier toward the closer right & bottom */
  #screenShade{ position:fixed; inset:0; z-index:12; pointer-events:none;
    background:radial-gradient(135% 125% at 30% 22%, rgba(0,0,0,0) 45%, rgba(0,0,0,.28) 100%); }
  #byteAnim.bump{ animation:bump .7s ease-in-out; }
  @keyframes bump{ 0%,100%{ transform:rotate(0);} 15%{ transform:rotate(-5deg);} 35%{ transform:rotate(4deg);} 55%{ transform:rotate(-3deg);} 75%{ transform:rotate(2deg);} }
  /* ONE leap per hop: he advances only while airborne (15–68%), grounded the rest of the time */
  #byteAnim.leap{ animation:leap 430ms linear; transform-origin:50% 90%; }
  @keyframes leap{   /* smooth parabolic hop — clean arc, soft landing, no squash pop */
    0%   { transform:translateY(0);   animation-timing-function:cubic-bezier(.2,.65,.35,1); }   /* lift, decelerate to apex */
    42%  { transform:translateY(-13%); animation-timing-function:cubic-bezier(.65,0,.8,.55); }  /* apex, accelerate down softly */
    80%  { transform:translateY(0); }   /* land */
    100% { transform:translateY(0); }   /* brief grounded settle */
  }
  #byteAnim.cheer{ animation:cheer .55s ease infinite; }
  @keyframes cheer{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-12%);} }
  #byteAnim.idle{ animation:idle 2.4s ease-in-out infinite; transform-origin:50% 90%; }
  @keyframes idle{ 0%,100%{ transform:scaleY(1);} 50%{ transform:scaleY(1.018);} }   /* gentle breathe-up, not a crouch */
  #byte{ width:100%; height:auto; display:block; filter:drop-shadow(0 6px 6px rgba(0,0,0,.3)); }
  #parcel{ position:absolute; z-index:4; pointer-events:none; filter:drop-shadow(0 4px 4px rgba(0,0,0,.3)); }
  #dog{ position:absolute; z-index:6; pointer-events:none; filter:drop-shadow(0 5px 5px rgba(0,0,0,.35)); transform-origin:bottom center; transform:scaleX(var(--flip,1)); }
  #dog.dogjump{ animation:dogJump .42s ease-out; }
  @keyframes dogJump{ 0%{ transform:scaleX(var(--flip,1)) translateY(0);} 45%{ transform:scaleX(var(--flip,1)) translateY(-48%);} 100%{ transform:scaleX(var(--flip,1)) translateY(0);} }

  /* house scan effect */
  #scanBox{ position:absolute; z-index:7; pointer-events:none; opacity:0; transition:opacity .25s;
    border:3px solid rgba(60,210,240,.9); border-radius:12px; overflow:hidden;
    box-shadow:0 0 16px rgba(60,210,240,.6), inset 0 0 22px rgba(60,210,240,.22); }
  #scanBox.on{ opacity:1; }
  #scanBox.ok{ border-color:rgba(70,220,120,.95); box-shadow:0 0 22px rgba(70,220,120,.75), inset 0 0 26px rgba(70,220,120,.32); }
  #scanBox.bad{ border-color:rgba(255,90,90,.95); box-shadow:0 0 22px rgba(255,90,90,.75), inset 0 0 26px rgba(255,90,90,.32); }
  #scanLine{ position:absolute; left:0; right:0; height:16%; top:-16%;
    background:linear-gradient(180deg, transparent, rgba(160,246,255,.95), transparent);
    box-shadow:0 0 14px rgba(160,246,255,.9); }
  #scanBox.on #scanLine{ animation:scanSweep .9s ease-in-out; }
  @keyframes scanSweep{ 0%{ top:-16%; } 100%{ top:100%; } }
  /* speech bubble above Byte's head while he looks */
  #headPop{
    position:absolute; left:46.9%; top:27%; transform:translate(-50%,10px) scale(.4); transform-origin:bottom center;
    opacity:0; z-index:9; pointer-events:none; white-space:nowrap;
    background:#fff; border-radius:14px; border:2px solid rgba(0,0,0,.16); padding:8px 24px;
    font-family:"Poppins",sans-serif; font-weight:500; font-size:clamp(16px,2.2vw,26px); color:#111111;
    box-shadow:0 10px 26px rgba(0,0,0,.28);
    transition:transform .25s cubic-bezier(.34,1.7,.5,1), opacity .2s;
  }
  #headPop.show{ transform:translate(-50%,0) scale(1); opacity:1; }
  #headPop::before{ content:""; position:absolute; left:50%; bottom:-13px; transform:translateX(-50%);
    border-left:12px solid transparent; border-right:12px solid transparent; border-top:15px solid rgba(0,0,0,.16); }
  #headPop::after{ content:""; position:absolute; left:50%; bottom:-11px; transform:translateX(-50%);
    border-left:11px solid transparent; border-right:11px solid transparent; border-top:14px solid #fff; }
  #headPop.side-left::before,#headPop.side-left::after{ left:78%; }    /* tail points down-right toward Byte */
  #headPop.side-right::before,#headPop.side-right::after{ left:22%; }  /* tail points down-left toward Byte */
  #dog.barking{ animation:dogBark .28s ease-in-out infinite; }
  @keyframes dogBark{ 0%,100%{ transform:scaleX(var(--flip,1)) scale(1,1); } 45%{ transform:scaleX(var(--flip,1)) scale(1.08,.93); } }

  /* Speech bubble */
  #bubble{
    position:fixed; left:50%; top:16px; transform:translate(-50%,-6px) scale(.98); opacity:0;
    background:#fff; color:#1d2433;
    width:fit-content; max-width:90vw; min-height:50px; box-sizing:border-box;
    padding:7px 34px; display:flex; align-items:center; justify-content:center;
    border-radius:14px; border:2px solid rgba(0,0,0,.16); box-shadow:0 4px 10px rgba(0,0,0,.10), 0 18px 40px rgba(0,0,0,.22);
    font-family:"Poppins",sans-serif; font-size:26px; font-weight:500; line-height:1.2; text-align:center;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .26s ease; z-index:20; pointer-events:none;
  }
  #bubble.show{ transform:translate(-50%,0) scale(1); opacity:1; }
  #bubbleText{ font-family:"Poppins",sans-serif; font-weight:500; }

  /* success overlay + flying parcel */
  #successOverlay{ position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,.4); opacity:0; transition:opacity .35s; pointer-events:none; }
  #successOverlay.show{ opacity:1; }
  #successCard{ background:#fff; border-radius:20px; border:2px solid rgba(0,0,0,.16); padding:42px 66px 46px;
    display:flex; flex-direction:column; align-items:center; text-align:center; gap:10px;
    box-shadow:0 24px 60px rgba(0,0,0,.4); transform:scale(.5); transition:transform .45s cubic-bezier(.34,1.7,.5,1);
    font-family:"Poppins",sans-serif; }
  #successOverlay.show #successCard{ transform:scale(1); }
  #successCard img{ width:104px; height:auto; display:block; margin:0 0 6px; filter:drop-shadow(0 6px 8px rgba(0,0,0,.25)); }
  #successTitle{ font-size:44px; font-weight:700; color:#23a76a; line-height:1.1; margin:0; letter-spacing:.01em; }
  #successSub{ font-size:25px; font-weight:500; color:#1d2433; line-height:1.3; margin:0; }
  #flyParcel{ position:fixed; width:70px; height:auto; z-index:40; pointer-events:none; opacity:0; left:0; top:0; }
  #score.pop{ animation:scorePop .45s ease; }
  @keyframes scorePop{ 0%,100%{ transform:scale(1); } 40%{ transform:scale(1.35); } }

  #score{
    position:fixed; top:3%; left:3%; z-index:20;
    background:#fff; color:#1d7fb8; font-weight:bold; padding:8px 18px; border-radius:40px;
    font-size:clamp(16px,3vw,26px); box-shadow:0 4px 0 rgba(0,0,0,.2);
    display:flex; align-items:center; gap:.3em;
  }
  #score img, #endScore img{ height:1.4em; width:auto; vertical-align:middle; }

  /* ===== Pill buttons (blue glossy, white border, circular badge) ===== */
  .pill{
    position:fixed; z-index:20; cursor:pointer; box-sizing:border-box; overflow:hidden;
    display:inline-flex; align-items:center; gap:.5em; padding:0 1em;
    height:var(--btn-h); border-radius:999px; white-space:nowrap;          /* full pill */
    color:#7c5836; font-family:"Poppins",sans-serif; font-weight:700; text-transform:uppercase;
    font-size:calc(var(--btn-h) * 0.39); letter-spacing:.07em;
    background:linear-gradient(#fffaf1 0%, #fbf0da 100%);                 /* cream / ivory */
    border:0.32em solid #d9b488;                                         /* warm wooden frame */
    box-shadow:
      0 0.4em 0.5em rgba(95,62,30,.3),             /* soft drop shadow beneath */
      inset 0 0 0 0.07em rgba(255,255,255,.65);    /* subtle inner light edge */
    text-shadow:none;
    transition:transform .12s ease, box-shadow .12s ease, opacity .3s;
  }
  .pill::before{                                   /* faint top sheen */
    content:""; position:absolute; left:6%; right:6%; top:8%; height:40%;
    border-radius:999px;
    background:linear-gradient(rgba(255,255,255,.5), rgba(255,255,255,0));
    pointer-events:none;
  }
  .pill > *{ position:relative; z-index:1; }       /* keep label/badge above the sheen */
  .pill .badge{
    flex:0 0 auto; width:1.2em; height:1.2em; border:none; background:none; box-shadow:none;
    display:flex; align-items:center; justify-content:center;
  }
  .pill .badge svg{ width:100%; height:100%; display:block; stroke:#7c5836; }   /* brown arrows */
  #startBtn .badge svg path, #againBtn .badge svg path{ fill:#7c5836; }         /* brown play-triangles */
  .pill:hover{ transform:translateY(-2px); }
  .pill:active{ transform:translateY(2px);         /* button sinks toward its shadow */
    box-shadow:0 0.16em 0.22em rgba(95,62,30,.26), inset 0 0 0 0.07em rgba(255,255,255,.55); }
  .pill.center{ left:50%; transform:translateX(-50%); }
  .pill.center:hover{ transform:translateX(-50%) translateY(-2px); }
  .pill.center:active{ transform:translateX(-50%) translateY(2px);
    box-shadow:0 0.16em 0.22em rgba(95,62,30,.26), inset 0 0 0 0.07em rgba(255,255,255,.55); }
  #leftBtn{ bottom:7%; right:calc(54% + 35px); }
  #rightBtn{ bottom:7%; left:54%; }
  #leftBtn, #rightBtn{ min-width:7.5em; justify-content:center; }   /* equal width, centred content */
  #leftBtn:disabled, #rightBtn:disabled{ opacity:0; pointer-events:none; }
  #bigBtn{ bottom:9%; animation:btnFloat 2.6s ease-in-out infinite; }    /* very subtle up/down drift */
  @keyframes btnFloat{ 0%,100%{ bottom:9%; } 50%{ bottom:calc(9% + 7px); } }
  #bigBtn:hover{ animation-play-state:paused; transform:translateX(-50%) translateY(-2px); }
  #againBtn{ bottom:9%; }

  #btnOverlay{ position:fixed; left:0; right:0; bottom:0; height:30%; z-index:18; pointer-events:none;
    background:linear-gradient(0deg, rgba(0,0,0,.6) 0%, rgba(0,0,0,.25) 45%, rgba(0,0,0,0) 100%);
    opacity:0; transition:opacity .4s; }
  #btnOverlay.show{ opacity:1; }
  /* drifting clouds (subtle ambience) */
  .cloud{ position:absolute; height:5%; background:rgba(255,255,255,.6); border-radius:50%;
    filter:blur(7px); pointer-events:none; z-index:11; animation:drift linear infinite; }
  .cloud.c1{ top:7%;  width:12%; opacity:.42; animation-duration:46s; }
  .cloud.c2{ top:16%; width:8%;  opacity:.3;  animation-duration:62s; animation-delay:-24s; }
  .cloud.c3{ top:4%;  width:10%; opacity:.36; animation-duration:54s; animation-delay:-38s; }
  @keyframes drift{ from{ left:-16%; } to{ left:116%; } }
  /* intro guide arrow that demonstrates the route */
  #introGuide{ position:absolute; left:49%; top:88%; transform:translate(-50%,-50%);
    width:clamp(36px,5vw,60px); height:clamp(36px,5vw,60px); z-index:13; opacity:0; pointer-events:none;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,.32)); transition:left .8s ease-in-out, top .8s ease-in-out, opacity .3s; }
  #introGuide svg{ width:100%; height:100%; display:block; transition:transform .3s ease; }
  /* full-screen announcement transition */
  #announce{ position:fixed; inset:0; z-index:35; display:flex; align-items:center; justify-content:center;
    background:rgba(20,15,40,.5); opacity:0; pointer-events:none; transition:opacity .4s; }
  #announce.show{ opacity:1; }
  #announceText{ font-family:"Poppins",sans-serif; font-weight:800; color:#fff; text-align:center;
    font-size:clamp(28px,6vw,62px); padding:0 6vw; line-height:1.22; text-shadow:0 4px 0 rgba(0,0,0,.32);
    transform:scale(.7); transition:transform .45s cubic-bezier(.34,1.7,.5,1); }
  #announce.show #announceText{ transform:scale(1); }
  #banner{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:15; }
  #bannerText{ font-size:clamp(40px,11vw,120px); font-weight:900; opacity:0; transform:scale(.4);
    transition:transform .35s cubic-bezier(.3,1.7,.5,1), opacity .35s; text-shadow:0 5px 0 rgba(0,0,0,.3); }
  #bannerText.show{ opacity:1; transform:scale(1); }
  .confetti{ position:fixed; width:11px; height:17px; top:-25px; border-radius:2px; z-index:14; pointer-events:none; }

  /* Big, bouncy kid-friendly PLAY button on the start screen — uses the play-button art */
  #startBtn{
    position:fixed; left:50%; bottom:3%; transform:translateX(-50%);
    width:clamp(140px,29vw,206px); aspect-ratio:1; padding:0; cursor:pointer; z-index:20;
    border:none; background:none; box-shadow:none;
    display:flex; align-items:center; justify-content:center;
    animation:startPulse 1.15s ease-in-out infinite;
  }
  #startBtn img{ width:100%; height:100%; object-fit:contain; display:block;
    filter:drop-shadow(0 8px 12px rgba(120,60,10,.4)); pointer-events:none; }
  #startBtn:hover{ animation:none; transform:translateX(-50%) scale(1.07); }
  #startBtn:active{ animation:none; transform:translateX(-50%) scale(.95); }
  @keyframes startPulse{ 0%,100%{ transform:translateX(-50%) scale(1); } 50%{ transform:translateX(-50%) scale(1.07); } }
  @keyframes startRing{ 0%{ transform:scale(.8); opacity:.7; } 100%{ transform:scale(1.55); opacity:0; } }

  #endScore{
    position:absolute; left:50%; top:14%; transform:translateX(-50%);
    background:rgba(255,255,255,.92); color:#1d7fb8; font-weight:bold;
    padding:10px 30px; border-radius:40px; font-size:clamp(20px,4vw,40px); box-shadow:0 6px 0 rgba(0,0,0,.2); z-index:20;
  }
</style>
</head>
<body>
  <div id="stage">

    <!-- START SCREEN -->

<script>
/* ===================== Frame, sprites, anchors ===================== */
const FRAME = { W:1920, H:1080 };
const SPRITE = {
  back:        "Assets/Byte%20Back.png",
  left:        "Assets/Byte%20Left.png",
  leftParcel:  "Assets/Byte%20Left%20with%20Parcel.png",
  right:       "Assets/Byte%20Right.png",
  rightParcel: "Assets/Byte%20Right%20with%20Parcel.png",
};
const NATIVE = {  // native px size of each sprite
  back:[251,236], left:[201,242], leftParcel:[201,242], right:[201,242], rightParcel:[201,242],
};
const ANCHOR = {  // foot point inside each sprite [centerX%, bottomY%] — measured from the art
  back:[0.54,0.754], left:[0.53,0.74], leftParcel:[0.53,0.74], right:[0.47,0.74], rightParcel:[0.47,0.74],
};

/* ---------------------------------------------------------------
   WAYPOINTS — Figma TOP-LEFT coordinates (px on a 1920x1080 frame).
   Paste your exact Figma x/y here; each sprite is drawn at native size,
   and Byte's FOOT point is kept on the path so sprites line up perfectly.
   --------------------------------------------------------------- */
const WP = {
  start:      { sprite:"back",  x:764.04, y:845 },   // ← your Figma value (-20px left)
  cross:      { sprite:"back",  x:764,    y:401 },   // intersection (travels 50px further up)
  leftHouse:  { sprite:"left",  x:181,    y:426 },   // blue house
  rightHouse: { sprite:"right", x:1537.5, y:426 },   // in front of the orange house (~85%)
};
/* foot point (frame px) for a waypoint = top-left + anchor*native */
function feetOf(wp){ const [w,h]=NATIVE[wp.sprite], [ax,ay]=ANCHOR[wp.sprite]; return { x:wp.x+ax*w, y:wp.y+ay*h }; }

/* ===================== Elements ===================== */
const $=id=>document.getElementById(id);
const startScreen=$("startScreen"), gameScreen=$("gameScreen"), endScreen=$("endScreen");
const byteWrap=$("byteWrap"), byteAnim=$("byteAnim"), byte=$("byte"), byteShadow=$("byteShadow");
const bubble=$("bubble"), bubbleText=$("bubbleText"), leftBtn=$("leftBtn"), rightBtn=$("rightBtn"), bigBtn=$("bigBtn");
const againBtn=$("againBtn"), scoreEl=$("score"), endScoreEl=$("endScore"), bannerText=$("bannerText");
const parcel=$("parcel");
const overlay=$("successOverlay"), successCard=$("successCard"), successTitle=$("successTitle"), successSub=$("successSub"), flyParcel=$("flyParcel");
function bumpScore(){ scoreEl.classList.remove("pop"); void scoreEl.offsetWidth; scoreEl.classList.add("pop"); }
function flyParcelToScore(){            // animate a parcel from the card to the counter, then +1
  return new Promise(res=>{
    const cr=successCard.getBoundingClientRect(), sr=scoreEl.getBoundingClientRect();
    flyParcel.style.transition="none";
    flyParcel.style.left=(cr.left+cr.width/2-35)+"px";
    flyParcel.style.top=(cr.top+cr.height/2-35)+"px";
    flyParcel.style.transform="scale(1)"; flyParcel.style.opacity="1";
    flyParcel.offsetHeight;
    flyParcel.style.transition="left .65s cubic-bezier(.5,-.25,.6,1), top .65s cubic-bezier(.4,.1,.7,1), transform .65s, opacity .6s";
    requestAnimationFrame(()=>{
      flyParcel.style.left=(sr.left+sr.height*0.55)+"px";
      flyParcel.style.top=(sr.top+sr.height/2-18)+"px";
      flyParcel.style.transform="scale(.35)";
    });
    setTimeout(()=>{
      flyParcel.style.opacity="0";
      score++; scoreEl.innerHTML=PARCEL_ICON+" "+score; bumpScore(); sfxCollect();
      res();
    }, 680);
  });
}
async function showSuccessOverlay(){
  successTitle.textContent="Delivered!";
  successSub.innerHTML="To the "+colorWord(targetColor)+" house";
  overlay.classList.add("show"); sfxPop();
  speak("Delivered to the "+targetColor+" house. Great job!");
  await sleep(650);
  const fly=flyParcelToScore();        // parcel flies to the counter...
  overlay.classList.remove("show");    // ...while the overlay fades away
  await fly;
  await sleep(100);
}
const glow={ left:$("glowLeft"), right:$("glowRight") };
function showParcel(isLeft, feet){            // drop the parcel by the door
  const w=83, h=76, cx=feet.x + (isLeft ? -120 : 120);   // well in front of Byte, by the door
  parcel.style.width=(w/FRAME.W*100)+"%";
  parcel.style.left=((cx-w/2)/FRAME.W*100)+"%";
  parcel.style.top=((feet.y-h)/FRAME.H*100)+"%";
  parcel.classList.remove("hide");
}
function hideParcel(){ parcel.classList.add("hide"); }
const dog=$("dog");
const DOG_DOOR = { left:200, right:1800 };    // doorway the dog emerges from (content centre-x, per side)
// the dog sprite is 1536x1024 with the dog content in a small region — position by that content:
const DOG_VIS=118, DOG_NW=1536, DOG_CW=530, DOG_BOT=755, DOG_CCX={ left:815, right:720 };
function dogPlace(isLeft, cx, feetY, animate, vis){   // cx = where the dog's centre goes, feetY = ground line; vis overrides visible width
  dog.src = isLeft ? "Assets/Dog%20for%20left%20house.png" : "Assets/Dog%20for%20right%20house.png";
  const S = (vis||DOG_VIS)/DOG_CW;            // scale so the visible dog is ~vis px wide
  let ccx = isLeft ? DOG_CCX.left : DOG_CCX.right;
  if(dog.style.getPropertyValue("--flip").trim()==="-1") ccx = DOG_NW - ccx;   // content centre mirrors when the dog faces the house
  dog.style.transition = animate ? "left .38s ease-out, width .38s ease-out, top .38s ease-out" : "none";
  dog.style.width = (DOG_NW*S/FRAME.W*100)+"%";
  dog.style.left  = ((cx - ccx*S)/FRAME.W*100)+"%";
  dog.style.top   = ((feetY - DOG_BOT*S)/FRAME.H*100)+"%";   // dog's paws land on the road
  if(!animate) dog.offsetHeight;
}
function hideDog(){ dog.classList.add("hide"); }
async function dogRushOut(side, landX){       // dog dashes out of the door and lands at landX
  const isLeft=side==="left", y=feetOf(WP.cross).y;
  const doorX=DOG_DOOR[isLeft?"left":"right"];
  setHouse(side,"open");                      // door is open, no dog sitting
  dog.style.setProperty("--flip","1");        // facing out toward Byte
  dogPlace(isLeft, doorX, y, false);          // dog appears at the door...
  dog.classList.remove("hide");
  await sleep(30);
  dog.classList.add("dogjump");               // ...and bounds out onto the path
  dogPlace(isLeft, landX, y, true);
  await sleep(400); dog.classList.remove("dogjump");
}
function oneBark(){ dog.classList.add("barking"); playBarkOnce(); setTimeout(()=>dog.classList.remove("barking"), 260); }  // one lively bark
async function dogBackIn(side, fromX){        // dog turns to face the house, then bounds home in two hops
  const isLeft=side==="left", y=feetOf(WP.cross).y;
  const door=DOG_DOOR[isLeft?"left":"right"];
  dog.style.setProperty("--flip","-1");       // turn around to face the house...
  if(fromX!=null) dogPlace(isLeft, fromX, y, false);   // re-anchor in place so the turn doesn't shift it sideways
  await sleep(160);                           // ...a beat so the turn reads...
  const mid = fromX!=null ? (fromX+door)/2 : door;
  // hop 1 — partway toward the house, still full size
  dog.classList.add("dogjump");
  dogPlace(isLeft, mid, y, true);
  await sleep(420);
  dog.classList.remove("dogjump"); void dog.offsetWidth;   // let the animation restart
  // hop 2 — shrinks as it scampers off and lands right by the door
  dog.classList.add("dogjump");
  dogPlace(isLeft, door, y, true, 84);                     // final, smaller size
  await sleep(420); dog.classList.remove("dogjump");
  hideDog();
  await houseClose(side);
  dog.style.setProperty("--flip","1");        // reset facing for next time
}
const headPop=$("headPop");
function showHeadPop(side){            // bubble close to Byte, on the matching side
  headPop.textContent = side==="left" ? "Left Turn" : "Right Turn";
  headPop.style.left = (side==="left" ? 42.5 : 55) + "%";   // left bubble sits nearer Byte
  headPop.classList.toggle("side-left", side==="left");
  headPop.classList.toggle("side-right", side!=="left");
  headPop.classList.add("show");
  sfxPop();                                          // pop-in
  speak(side==="left" ? "Left turn" : "Right turn"); // VO matches the popup
}
function hideHeadPop(){ if(headPop.classList.contains("show")) sfxPopOff(); headPop.classList.remove("show"); }
const houseLeft=$("houseLeft"), houseRight=$("houseRight");
let leftColor="blue", rightColor="red";
function houseFile(color, variant){   // variant: ""(closed) | "open" | "dog"
  // NOTE: filenames contain a literal "+", which Vercel decodes as a space in URLs.
  // Pre-encode the path (%20 = space, %2B = plus) so it resolves on the server and locally.
  const suffix = variant==="open" ? "%20%2B%20Open%20Gate"
               : variant==="dog" ? "%20%2B%20Dog"
               : variant==="dogparcel" ? "%20%2B%20Dog%20%2B%20Parcel"
               : "";
  return "Assets/" + COLOR_NAME[color] + "%20House" + suffix + ".png";
}
function setHouse(side, variant){
  const color = side==="left" ? leftColor : rightColor;
  (side==="left"?houseLeft:houseRight).src = houseFile(color, variant);
}
function closeHouses(){ setHouse("left",""); setHouse("right",""); }
async function houseOpen(side){ setHouse(side,"open"); await sleep(130); setHouse(side,"dog"); }   // door cracks, then the dog pulls it open
async function houseClose(side){   // dog steps back, door shuts, house gives a little bounce
  setHouse(side,"open"); await sleep(130); setHouse(side,"");
  const el = side==="left" ? houseLeft : houseRight;
  el.classList.remove("happy"); void el.offsetWidth;   // restart cleanly if a happy hop just played
  el.classList.add("bounce"); sfxPopOff();
  await sleep(450); el.classList.remove("bounce");
}
async function houseHappy(side){   // the house gives a joyful squash-stretch hop when it gets its parcel
  const el = side==="left" ? houseLeft : houseRight;
  sfxBoing();
  el.classList.add("happy");
  await sleep(950);
  el.classList.remove("happy");
}
const scanBox=$("scanBox");
const SCAN={ left:{left:7,top:31,w:17,h:21}, right:{left:77,top:29,w:17,h:21} };  // scan box over each house (% of frame)
async function scanHouse(isLeft, isCorrect){
  const r = isLeft ? SCAN.left : SCAN.right;
  scanBox.style.left=r.left+"%"; scanBox.style.top=r.top+"%"; scanBox.style.width=r.w+"%"; scanBox.style.height=r.h+"%";
  scanBox.classList.remove("ok","bad","on"); void scanBox.offsetWidth;   // restart the sweep
  scanBox.classList.add("on");
  scanBeep();
  await sleep(950);                                  // scan line sweeps over the house
  scanBox.classList.add(isCorrect ? "ok" : "bad");   // result flash (green / red)
  await sleep(450);
  scanBox.classList.remove("on","ok","bad");
}
const arrow={ left:$("arrowLeft"), right:$("arrowRight") };
const travUp=$("travelator"), travLeft=$("travLeft"), travRight=$("travRight");
function setDir(el, dir){  // 'left' or 'right' — arrow shape + flow direction
  el.classList.toggle("point-left",  dir==="left");
  el.classList.toggle("point-right", dir==="right");
}
function travel(which){  // moving escalator arrows removed — keep all hidden in every state
  travUp.classList.add("hide"); travLeft.classList.add("hide"); travRight.classList.add("hide");
}

/* ===================== Config + state ===================== */
const TOTAL_ROUNDS=5, TUTORIAL_ROUNDS=2;
const PARCEL_ICON='<img src="Assets/Parcel.png" alt="parcels">';
let target="left", targetColor="blue", score=0, round=0, busy=false, lookTimer=[], curSprite="back", lastFootX=0, lastFootY=0;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ===================== Byte placement (foot-anchored) ===================== */
function topLeftFor(sprite, footX, footY){
  const [w,h]=NATIVE[sprite], [ax,ay]=ANCHOR[sprite];
  return { left:(footX-ax*w)/FRAME.W*100, top:(footY-ay*h)/FRAME.H*100, w:w/FRAME.W*100 };
}
function setByte(sprite, footX, footY){           // instant placement
  byte.src=SPRITE[sprite]; curSprite=sprite;
  const b=topLeftFor(sprite,footX,footY);
  byteWrap.style.transition="none";
  byteWrap.style.width=b.w+"%"; byteWrap.style.left=b.left+"%"; byteWrap.style.top=b.top+"%";
  byteWrap.offsetHeight; byteWrap.style.transition="";
  lastFootX=footX; lastFootY=footY;
}
async function nudge(footX, footY, dur){          // quick small move, keeps current sprite
  const b=topLeftFor(curSprite,footX,footY);
  byteWrap.style.transition=`left ${dur}ms ease-out, top ${dur}ms ease-out`;
  byteWrap.style.left=b.left+"%"; byteWrap.style.top=b.top+"%";
  lastFootX=footX; lastFootY=footY;
  await sleep(dur+20); byteWrap.style.transition="";
}
/* ---- discrete hopping locomotion: Byte advances ONLY while airborne, both vertical & horizontal ---- */
const HOP_STEP=120;                               // frame-px advanced per hop (smaller = shorter hops)
const HOP_CROUCH=0, HOP_AIR=345, HOP_TOTAL=430;   // ms: airborne window + brief settle (matches @keyframes leap: arc 0–80%)
async function moveByte(sprite, footX, footY){
  byte.src=SPRITE[sprite]; curSprite=sprite;
  const b=topLeftFor(sprite,footX,footY);
  byteWrap.style.width=b.w+"%";
  const sx=lastFootX, sy=lastFootY;
  const dist=Math.hypot(footX-sx, footY-sy);
  const hops=Math.max(1, Math.round(dist/HOP_STEP));
  for(let i=1;i<=hops;i++){
    const tx=sx+(footX-sx)*i/hops, ty=sy+(footY-sy)*i/hops;
    const tl=topLeftFor(sprite,tx,ty);
    // restart the leap + shadow for this hop
    byteAnim.classList.remove("leap"); byteShadow.classList.remove("sh-leap"); void byteAnim.offsetWidth;
    byteAnim.classList.add("leap"); byteShadow.classList.add("sh-leap");
    // advance ONLY while airborne, at CONSTANT horizontal speed (linear) → true parabola with the vertical arc
    byteWrap.style.transition=`left ${HOP_AIR}ms linear ${HOP_CROUCH}ms, top ${HOP_AIR}ms linear ${HOP_CROUCH}ms`;
    requestAnimationFrame(()=>{ byteWrap.style.left=tl.left+"%"; byteWrap.style.top=tl.top+"%"; });
    setTimeout(sfxStep, HOP_CROUCH+HOP_AIR);    // one soft tap on landing
    await sleep(HOP_TOTAL);
  }
  byteAnim.classList.remove("leap"); byteShadow.classList.remove("sh-leap");
  byteWrap.style.transition="";
  lastFootX=footX; lastFootY=footY;
}

/* ===================== Look both ways ===================== */
async function lookBothWays(){          // runs to completion BEFORE the buttons appear
  const f=feetOf(WP.cross);
  setByte("back",  f.x, f.y); await sleep(450);                       // settle at the centre
  setByte("rightParcel", f.x, f.y); showHeadPop("right"); await sleep(1400);// look right (carrying) + bubble
  hideHeadPop(); setByte("back", f.x, f.y); await sleep(450);         // back to centre
  setByte("leftParcel",  f.x, f.y); showHeadPop("left"); await sleep(1400); // look left (carrying) + bubble
  hideHeadPop(); setByte("back", f.x, f.y); await sleep(450);         // back to centre
  byteAnim.classList.add("idle");                  // then start the idle pulse
}
function stopLook(){ byteAnim.classList.remove("idle"); }

const TOP_ROAD_X = 1485;                 // x of the vertical road that exits the top (≈77% of 1920)
async function exitFrame(isLeft){        // after a correct delivery, Byte walks off-frame
  byteAnim.classList.remove("idle");
  const cf=feetOf(WP.cross);
  if(isLeft){
    await moveByte("left", -280, cf.y);          // keep going left, off the left edge
  } else {
    await moveByte("right", 2200, cf.y);         // keep going straight right, off the right edge
  }
}

/* ===================== UI helpers ===================== */
let bubbleTimer=null;
function say(t){ const wasHidden=!bubble.classList.contains("show"); bubbleText.innerHTML=t; bubble.classList.add("show");
  if(wasHidden) sfxPop();                                              // UI sound exactly when the text box appears
  if(bubbleTimer) clearTimeout(bubbleTimer);
  bubbleTimer=setTimeout(()=>bubble.classList.remove("show"), 3500);   // auto-hide a few seconds after speaking
}
const COLOR_NAME={ red:"Red", blue:"Blue", yellow:"Yellow" };
const COLOR_HEX ={ red:"#e8402c", blue:"#1f93d6", yellow:"#f0a500" };
function colorWord(color){  // the house colour, in its own colour, Poppins semi-bold
  return '<span style="font-family:\'Poppins\',sans-serif;font-weight:600;color:'+COLOR_HEX[color]+'">'+COLOR_NAME[color].toUpperCase()+'</span>';
}
function hideBubble(){ if(bubbleTimer){ clearTimeout(bubbleTimer); bubbleTimer=null; } bubble.classList.remove("show"); }
function showButtons(s){ leftBtn.disabled=rightBtn.disabled=!s; $("btnOverlay").classList.toggle("show",s); }
function highlightTarget(on, showArrow){
  glow.left.classList.toggle("on",  on&&target==="left");
  glow.right.classList.toggle("on", on&&target==="right");
  arrow.left.classList.toggle("on",  on&&showArrow&&target==="left");
  arrow.right.classList.toggle("on", on&&showArrow&&target==="right");
}

/* ---------- Sound + speech ---------- */
let actx;
function tone(f,s,d,t="sine",v=0.2){ if(!actx)return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=t;o.frequency.value=f;o.connect(g);g.connect(actx.destination); const x=actx.currentTime+s;
  g.gain.setValueAtTime(0,x);g.gain.linearRampToValueAtTime(v,x+.02);g.gain.exponentialRampToValueAtTime(.001,x+d);o.start(x);o.stop(x+d+.05); }
function sfxWin(){ [523,659,784,1046].forEach((f,i)=>tone(f,i*.12,.25,"triangle",.25)); }
function sfxFail(){ tone(330,0,.18,"sawtooth",.2); tone(220,.16,.3,"sawtooth",.2); }
function sfxStep(){   // soft, gentle landing tap for each little hop
  if(!actx) return; const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type="sine"; o.frequency.setValueAtTime(330,t); o.frequency.exponentialRampToValueAtTime(180,t+0.08);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.05,t+0.008); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.13);
}
function sfxPop(){    // micro UI sound — something pops in
  if(!actx) return; const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type="sine"; o.frequency.setValueAtTime(680,t); o.frequency.exponentialRampToValueAtTime(1150,t+0.08);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.12,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.16);
}
function sfxLand(){   // soft, cushioned "dhumm" landing with a playful little spring-up
  if(!actx) return; const t=actx.currentTime;
  // 1) rounded body — gentle pitch drop, soft attack (no click)
  const o=actx.createOscillator(), g=actx.createGain();
  o.type="sine"; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(66,t+0.16);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.24,t+0.03); g.gain.exponentialRampToValueAtTime(0.001,t+0.34);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.36);
  // 2) soft low "whump" — noise through a low-pass so there's body but no harsh hiss
  const nb=actx.createBufferSource(); const buf=actx.createBuffer(1,Math.floor(actx.sampleRate*0.08),actx.sampleRate);
  const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length); nb.buffer=buf;
  const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=380; lp.Q.value=0.7;
  const ng=actx.createGain(); ng.gain.setValueAtTime(0.13,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  nb.connect(lp); lp.connect(ng); ng.connect(actx.destination); nb.start(t); nb.stop(t+0.11);
  // 3) playful spring-up blip just after landing — gives Byte a bouncy, toy-like feel
  const o2=actx.createOscillator(), g2=actx.createGain();
  o2.type="sine"; o2.frequency.setValueAtTime(300,t+0.1); o2.frequency.exponentialRampToValueAtTime(560,t+0.19);
  g2.gain.setValueAtTime(0,t+0.1); g2.gain.linearRampToValueAtTime(0.07,t+0.12); g2.gain.exponentialRampToValueAtTime(0.001,t+0.24);
  o2.connect(g2); g2.connect(actx.destination); o2.start(t+0.1); o2.stop(t+0.26);
}
function sfxClick(){  // button press
  if(!actx) return; const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type="square"; o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(860,t+0.05);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.13,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.12);
}
function sfxCollect(){  // score / parcel collected — two-note ding
  if(!actx) return; const t=actx.currentTime;
  [880,1320].forEach((f,i)=>{ const o=actx.createOscillator(), g=actx.createGain(); o.type="sine"; o.frequency.value=f;
    const s=t+i*0.08; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(0.16,s+0.01); g.gain.exponentialRampToValueAtTime(0.001,s+0.2);
    o.connect(g); g.connect(actx.destination); o.start(s); o.stop(s+0.22); });
}
function sfxBoing(){  // springy, happy bounce — for the house's joyful hop
  if(!actx) return; const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type="sine";
  o.frequency.setValueAtTime(300,t);
  o.frequency.exponentialRampToValueAtTime(640,t+0.12);   // spring up...
  o.frequency.exponentialRampToValueAtTime(440,t+0.34);   // ...settle with a little wobble
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.2,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.52);
}
function sfxPopOff(){ // micro UI sound — something pops out
  if(!actx) return; const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
  o.type="sine"; o.frequency.setValueAtTime(900,t); o.frequency.exponentialRampToValueAtTime(480,t+0.1);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.08,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.14);
}
function sfxHop(){   // punchy cartoon boing + soft tap, one per jump
  if(!actx) return;
  const t=actx.currentTime;
  const o=actx.createOscillator(), g=actx.createGain();
  o.type="triangle";
  o.frequency.setValueAtTime(300,t);
  o.frequency.exponentialRampToValueAtTime(640,t+0.06);
  o.frequency.exponentialRampToValueAtTime(210,t+0.2);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.3,t+0.015); g.gain.exponentialRampToValueAtTime(0.001,t+0.23);
  o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+0.25);
  const o2=actx.createOscillator(), g2=actx.createGain();   // soft footfall thump
  o2.type="sine"; o2.frequency.setValueAtTime(150,t);
  g2.gain.setValueAtTime(0.2,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
  o2.connect(g2); g2.connect(actx.destination); o2.start(t); o2.stop(t+0.1);
}
function scanBeep(){ if(!actx) return; tone(740,0,.07,"square",.12); tone(990,.12,.07,"square",.12); tone(1320,.24,.09,"square",.12); }
/* Real recorded bark from Audio/dog bark.ogg. Falls back to synth if missing. */
const barkAudio = new Audio("Audio/dog%20bark.ogg");
barkAudio.preload = "auto";
function playBarkOnce(){
  try{
    barkAudio.currentTime = 0;
    const p = barkAudio.play();
    if(p && p.catch) p.catch(()=> sfxBark());   // no file / blocked → synth
  }catch(e){ sfxBark(); }
}
function playBark(){ playBarkOnce(); setTimeout(playBarkOnce, 2000); }   // bark twice, 2s apart
function barkAndWait(){   // play one bark, pulse the dog while it sounds, resolve when finished
  return new Promise(res=>{
    let done=false; const fin=()=>{ if(done)return; done=true; dog.classList.remove("barking"); res(); };
    dog.classList.add("barking");                  // dog visibly barks with the sound
    try{
      barkAudio.currentTime=0;
      barkAudio.addEventListener("ended", fin, {once:true});
      const p=barkAudio.play();
      if(p && p.catch) p.catch(()=>{ sfxBark(); setTimeout(fin,900); });
      setTimeout(fin, 1600);   // fallback if no 'ended' fires
    }catch(e){ sfxBark(); setTimeout(fin,900); }
  });
}
function woof(t0, base, dlyBus){
  if(!actx) return;
  const dur=0.2;
  const o=actx.createOscillator(); o.type="sawtooth";
  o.frequency.setValueAtTime(base*1.5,t0);
  o.frequency.exponentialRampToValueAtTime(base*0.78,t0+0.045);
  o.frequency.exponentialRampToValueAtTime(base*0.55,t0+dur);
  const o2=actx.createOscillator(); o2.type="square"; o2.frequency.setValueAtTime(base*0.5,t0);
  const bp=actx.createBiquadFilter(); bp.type="bandpass"; bp.frequency.value=1100; bp.Q.value=1.0;
  const g=actx.createGain();
  g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(.5,t0+.02); g.gain.exponentialRampToValueAtTime(.001,t0+dur);
  o.connect(bp); o2.connect(bp); bp.connect(g); g.connect(actx.destination); if(dlyBus) g.connect(dlyBus);
  o.start(t0); o.stop(t0+dur+.05); o2.start(t0); o2.stop(t0+dur+.05);
  const nb=actx.createBufferSource(); const buf=actx.createBuffer(1,Math.floor(actx.sampleRate*0.05),actx.sampleRate);
  const d=buf.getChannelData(0); for(let j=0;j<d.length;j++) d[j]=Math.random()*2-1; nb.buffer=buf;
  const nf=actx.createBiquadFilter(); nf.type="bandpass"; nf.frequency.value=1500; nf.Q.value=.7;
  const ng=actx.createGain(); ng.gain.setValueAtTime(.3,t0); ng.gain.exponentialRampToValueAtTime(.001,t0+.05);
  nb.connect(nf); nf.connect(ng); ng.connect(actx.destination); nb.start(t0); nb.stop(t0+.05);
}
function sfxBark(){            // synth fallback — 3 rough woofs with an outdoor "road" echo
  if(!actx) return;
  const t=actx.currentTime;
  const dly=actx.createDelay(); dly.delayTime.value=0.14;
  const fb=actx.createGain(); fb.gain.value=0.22; const wet=actx.createGain(); wet.gain.value=0.28;
  dly.connect(fb); fb.connect(dly); dly.connect(wet); wet.connect(actx.destination);
  woof(t, 300, dly); woof(t+0.34, 330, dly); woof(t+0.72, 285, dly);
}
let preferredVoice=null;
function pickVoice(){ try{ const vs=speechSynthesis.getVoices(); if(!vs||!vs.length) return;
  preferredVoice = vs.find(v=>/^en/i.test(v.lang) && /google/i.test(v.name))      // clearer Google voices first
               || vs.find(v=>/^en[-_]?(US|GB|AU)/i.test(v.lang))
               || vs.find(v=>/^en/i.test(v.lang)) || vs[0];
}catch(e){} }
if("speechSynthesis"in window){ pickVoice(); window.speechSynthesis.onvoiceschanged=pickVoice; }
function speak(t){   // returns a promise that resolves when the line finishes (so callers can await it)
  return new Promise(res=>{
    try{
      if(!("speechSynthesis"in window)){ res(); return; }
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(t); u.rate=.95; u.pitch=1.0;
      if(preferredVoice) u.voice=preferredVoice;
      let done=false; const fin=()=>{ if(done)return; done=true; res(); };
      u.onend=fin; u.onerror=fin;
      setTimeout(fin, 900 + t.length*75);   // fallback if onend never fires
      speechSynthesis.speak(u);
    }catch(e){ res(); }
  });
}
let moveSpeakTimer=null;
function startMoveSpeak(phrase){ stopMoveSpeak(); speak(phrase); }   // say it once — no looping narration while idle
function stopMoveSpeak(){ if(moveSpeakTimer){ clearInterval(moveSpeakTimer); moveSpeakTimer=null; } try{ if("speechSynthesis"in window) speechSynthesis.cancel(); }catch(e){} }

function confetti(){
  const colors=["#ff6a3d","#23a76a","#ffce3a","#2bb3e0","#e84393","#fff"];
  for(let i=0;i<70;i++){ const c=document.createElement("div"); c.className="confetti";
    c.style.left=Math.random()*100+"%"; c.style.background=colors[i%colors.length];
    const fall=1000+Math.random()*1000; c.style.transition=`transform ${fall}ms linear, opacity ${fall}ms`;
    gameScreen.appendChild(c);
    requestAnimationFrame(()=>{ c.style.transform=`translateY(${window.innerHeight+50}px) rotate(${Math.random()*720}deg)`; c.style.opacity=.2; });
    setTimeout(()=>c.remove(), fall+100);
  }
}
function banner(t,c){ bannerText.textContent=t; bannerText.style.color=c; bannerText.classList.add("show"); setTimeout(()=>bannerText.classList.remove("show"),1600); }

/* ===================== Game flow ===================== */
const introGuide=$("introGuide"), announceEl=$("announce"), announceText=$("announceText");
let reuseColors=false;
function setGuide(leftPct, topPct, deg){ introGuide.style.left=leftPct+"%"; introGuide.style.top=topPct+"%";
  const s=introGuide.querySelector("svg"); if(s) s.style.transform="rotate("+deg+"deg)"; }   // deg: 0 up · -90 left · 90 right
async function announce(text){    // full-screen transition card
  announceText.textContent=text; announceEl.classList.add("show"); sfxPop(); speak(text);
  await sleep(2300); announceEl.classList.remove("show"); await sleep(450);
}
function pickColors(){            // choose two distinct house colours and show the houses
  const pool=["red","blue","yellow"];
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  leftColor=pool[0]; rightColor=pool[1]; closeHouses();
}

/* ---- gentle, subtle background music: soft synth pad + a light bell, slow chord loop ---- */
let musicTimer=null, musicGain=null;
const MUSIC_CHORDS=[[262,330,392],[196,294,392],[220,277,330],[174,220,261]];  // C · G · Am · F (soft, warm)
function startMusic(){
  if(!actx || musicTimer) return;
  musicGain=actx.createGain(); musicGain.gain.value=0.05; musicGain.connect(actx.destination);
  let i=0;
  const playChord=()=>{
    if(!actx) return; const t=actx.currentTime, ch=MUSIC_CHORDS[i++ % MUSIC_CHORDS.length];
    ch.forEach((f)=>{ const o=actx.createOscillator(), g=actx.createGain();      // soft sustained pad
      o.type="sine"; o.frequency.value=f;
      g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.5,t+0.9); g.gain.linearRampToValueAtTime(0.0001,t+3.8);
      o.connect(g); g.connect(musicGain); o.start(t); o.stop(t+3.9); });
    const b=actx.createOscillator(), bg=actx.createGain();                         // gentle bell on the root, an octave up
    b.type="triangle"; b.frequency.value=ch[0]*2;
    bg.gain.setValueAtTime(0,t+0.05); bg.gain.linearRampToValueAtTime(0.16,t+0.12); bg.gain.exponentialRampToValueAtTime(0.0001,t+1.6);
    b.connect(bg); bg.connect(musicGain); b.start(t+0.05); b.stop(t+1.7);
  };
  playChord(); musicTimer=setInterval(playChord, 3400);
}
function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } if(musicGain){ musicGain.gain.value=0; musicGain=null; } }

function startGame(){
  score=0; round=0; scoreEl.innerHTML=PARCEL_ICON+" 0";
  startScreen.classList.add("hide"); endScreen.classList.add("hide"); gameScreen.classList.remove("hide");
  startMusic();                                   // soft background music
  introSequence();
}

async function introSequence(){
  busy=true; showButtons(false); hideBubble(); bigBtn.classList.add("hide"); hideParcel(); hideDog(); highlightTarget(false);
  pickColors();                                   // show the round-1 houses so the demo matches
  const sf=feetOf(WP.start);
  setByte("back", sf.x, FRAME.H+260);             // Byte waits just below the bottom of the frame

  // 1) a little guide arrow demonstrates the route (moves only straight: up, then sideways)
  introGuide.style.transition="none"; setGuide(49,86,0); void introGuide.offsetWidth; // snap to the start at the bottom (no slide-in)
  introGuide.style.transition=""; introGuide.style.opacity="1"; await sleep(450);
  say("Byte drives up the path to the crossing.");
  await speak("Byte drives up the path to the crossing");
  setGuide(49,52,0); await sleep(1000);           // straight up the path to the junction
  setGuide(30,52,-90);                            // straight left along the road (symmetric: 49-19)
  say("Turn LEFT to reach the "+colorWord(leftColor)+" house.");
  await speak("Turn left to reach the "+leftColor+" house"); await sleep(450);
  setGuide(68,52,90);                             // straight across to the right (symmetric: 49+19)
  say("Turn RIGHT to reach the "+colorWord(rightColor)+" house.");
  await speak("Turn right to reach the "+rightColor+" house"); await sleep(450);
  introGuide.style.opacity="0"; hideBubble(); await sleep(300);

  // 2) announcement transition
  await announce("Help Byte deliver the parcels! 📦");

  // 3) Byte walks in from the bottom of the frame (no lilt on the way in)
  await moveByte("back", sf.x, sf.y);

  reuseColors=true; busy=false;
  nextRound();
}

async function nextRound(){
  round++;
  busy=true; stopLook(); showButtons(false); hideBubble(); highlightTarget(false); hideParcel(); hideDog(); hideHeadPop(); bigBtn.classList.add("hide");
  const tutorial = round<=TUTORIAL_ROUNDS;
  // pick two distinct house colours (round 1 reuses the colours shown in the intro)
  if(reuseColors){ reuseColors=false; } else { pickColors(); }
  target = Math.random()<0.5 ? "left" : "right";
  targetColor = target==="left" ? leftColor : rightColor;

  const sf=feetOf(WP.start);
  setByte("back", sf.x, sf.y);
  travel("up");                                 // vertical escalator while driving up
  await sleep(150);

  say("Take the parcel to the "+colorWord(targetColor)+" house! 📦");
  await speak("Take the parcel to the "+targetColor+" house");   // let the line finish
  await sleep(250);
  const cf=feetOf(WP.cross);
  await moveByte("back", cf.x, cf.y);          // hop up to the intersection

  travel("none");                               // reached intersection → escalator off
  await sleep(400);                             // settle a beat after arriving
  await lookBothWays();                         // complete the look BEFORE buttons appear
  say("Which way should Byte turn?");
  if(tutorial){ await speak("Which way? Left or right?"); await sleep(150); }
  showButtons(true); busy=false;
}

async function choose(side){
  if(busy)return; busy=true; stopLook();
  showButtons(false); hideBubble(); highlightTarget(false); hideHeadPop(); bigBtn.classList.add("hide");

  const isLeft = side==="left";
  const moveSprite   = isLeft ? "left" : "right";
  const parcelSprite = isLeft ? "leftParcel" : "rightParcel";
  const houseWp      = isLeft ? WP.leftHouse : WP.rightHouse;
  const cf=feetOf(WP.cross), hf=feetOf(houseWp);
  hf.y = cf.y;                                 // keep feet on the same road line (no vertical drift)
  const correct = (side===target);

  setByte(parcelSprite, cf.x, cf.y);           // turn the chosen way, carrying the parcel
  await sleep(350);
  travel(isLeft ? "left" : "right");           // escalator on, in the travel direction
  startMoveSpeak(isLeft ? "Moving left" : "Moving right");   // repeats until he arrives
  await moveByte(parcelSprite, hf.x, hf.y);     // hop to the house carrying the parcel
  stopMoveSpeak();
  travel("none");

  // arrived — Byte holds the parcel and calls out
  setByte(parcelSprite, hf.x, hf.y);
  say("Delivery! Delivery! 📦"); await speak("Delivery! Delivery!");   // let the call finish
  await sleep(150);
  setHouse(side, "open");                       // the door opens
  await sleep(300);

  if(correct){
    setHouse(side, "dog");                       // friendly dog appears at the door to receive
    await sleep(300);
    say("Here you go! 🎉"); await speak("Here you go!");
    setByte(moveSprite, hf.x, hf.y);            // hands go empty exactly as the parcel leaves them
    await tossParcelToDoor(side, hf);           // parcel flies to the door
    setHouse(side, "dogparcel");                // the dog catches and holds the parcel
    await sleep(550);
    await houseHappy(side);                     // the house does a joyful little hop
    await houseClose(side);                     // door shuts
    sfxWin(); confetti(); byteAnim.classList.add("cheer");
    await showSuccessOverlay();                 // success popup → parcel flies into the counter
    byteAnim.classList.remove("cheer");
    await exitFrame(isLeft);                     // walk off-frame after delivering
    if(score>=TOTAL_ROUNDS){ endGame(); busy=false; return; }
    bigBtn.classList.remove("hide"); $("btnOverlay").classList.add("show"); busy=false;
  } else {
    // wrong house — the dog bursts out and Byte springs back in fear, then the dog lunges
    banner("Oh no! 🚫","#ff5b5b");
    const back     = isLeft ? 1 : -1;             // direction Byte recoils (away from the house)
    const recoilX  = hf.x + back*230;             // Byte leaps back toward the path
    const dogOutX  = recoilX - back*210;          // dog lands on the house-side of Byte — clear gap, no overlap
    const dogLungeX= recoilX - back*185;          // dog lunges in closer on the 2nd bark
    const groundY  = feetOf(WP.cross).y;
    const backParcel = isLeft ? "rightParcel" : "leftParcel";

    // BARK 1 — dog leaps out of the door while Byte springs back: they never overlap
    byteAnim.classList.add("bump"); sfxFail();
    dog.classList.add("barking"); playBarkOnce();
    const recoilP = nudge(recoilX, hf.y, 360);    // Byte recoils in fear...
    await dogRushOut(side, dogOutX);              // ...dog bounds out beside him (not on top)
    await recoilP;
    await sleep(650);
    dog.classList.remove("barking");
    await sleep(450);

    // BARK 2 — the dog lunges toward Byte to attack
    dog.classList.add("barking"); playBarkOnce();
    dogPlace(isLeft, dogLungeX, groundY, true);
    await sleep(1100);
    dog.classList.remove("barking");
    await sleep(450);

    // BARK 3 — Byte turns and runs home as the dog gives its last bark
    dog.classList.add("barking"); playBarkOnce();
    byteAnim.classList.remove("bump");
    setByte(backParcel, recoilX, hf.y);
    travel(isLeft ? "left-back" : "right-back");
    const byteReturning = moveByte(backParcel, cf.x, cf.y).then(()=>{ stopMoveSpeak(); });
    await sleep(1100);
    dog.classList.remove("barking");

    // the dog finishes its last bark, then turns and trots back into the house
    await dogBackIn(side, dogLungeX);
    await byteReturning;                           // Byte reaches the intersection
    travel("none");
    setByte("back", cf.x, cf.y); byteAnim.classList.add("idle");

    // then the narrator explains
    say("Oops! Wrong house!"); await speak("Oops! Wrong house!");
    await sleep(150);
    say("The parcel goes to the "+colorWord(targetColor)+" house!");
    await speak("The parcel goes to the "+targetColor+" house");
    await sleep(150);
    showButtons(true); busy=false;
  }
}
async function tossParcelToDoor(side, hf){       // Byte tosses the parcel into the open door
  const isLeft=side==="left", w=83, h=76;
  const doorX = isLeft ? 187 : 1808;             // door opening (px) per house (right is mirrored)
  const doorY = 480;
  const startX = hf.x + (isLeft ? -45 : 45), startY = hf.y - 150;
  parcel.style.transition="none";
  parcel.style.width=(w/FRAME.W*100)+"%";
  parcel.style.left=((startX-w/2)/FRAME.W*100)+"%";
  parcel.style.top=((startY-h)/FRAME.H*100)+"%";
  parcel.classList.remove("hide"); parcel.offsetHeight;
  parcel.style.transition="left .5s ease-in, top .5s cubic-bezier(.4,-.4,.7,1)";
  parcel.style.left=((doorX-w/2)/FRAME.W*100)+"%";
  parcel.style.top=((doorY-h)/FRAME.H*100)+"%";
  await sleep(530);
  parcel.classList.add("hide");                  // parcel goes inside
}

function endGame(){
  stopLook(); travel("none");
  gameScreen.classList.add("hide");
  endScoreEl.innerHTML=PARCEL_ICON+" "+score+" delivered!";
  endScreen.classList.remove("hide");
  sfxWin(); speak("Amazing! You delivered all the parcels!");
}

/* ===================== Controls ===================== */
function ensureAudio(){ try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); if(actx.state==="suspended") actx.resume(); }catch(e){} }
$("startBtn").addEventListener("click", ()=>{ ensureAudio(); sfxClick(); startGame(); });
bigBtn.addEventListener("click",  ()=>{ ensureAudio(); sfxClick(); nextRound(); });
againBtn.addEventListener("click",()=>{ ensureAudio(); sfxClick(); startGame(); });
leftBtn.addEventListener("click", ()=>{ ensureAudio(); sfxClick(); choose("left"); });
rightBtn.addEventListener("click",()=>{ ensureAudio(); sfxClick(); choose("right"); });
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft"  && !leftBtn.disabled){  sfxClick(); choose("left"); }
  if(e.key==="ArrowRight" && !rightBtn.disabled){ sfxClick(); choose("right"); }
});

/* initial placement */
(function(){ const sf=feetOf(WP.start); setByte("back", sf.x, sf.y); })();
</script>
